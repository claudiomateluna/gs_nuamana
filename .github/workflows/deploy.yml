name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Cargar NVM y Node.js para que estén disponibles en este shell no interactivo
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd /var/www/nuamana
            # Descargar los últimos cambios desde GitHub
            git pull origin main
            
            # Aplicar migración de base de datos
            echo "Ejecutando migración de objetivos educativos en la base de datos..."
            docker exec -i supabase-db psql -U postgres -d postgres < supabase/migrations/20260709000000_articulo_objetivos_educativos.sql

            # Entrar al frontend e instalar y compilar limpiando la caché de Next.js
            cd frontend
            npm install
            rm -rf .next
            npm run build
            
            # Reiniciar la aplicación de Next.js en PM2
            pm2 restart nuamana-pwa