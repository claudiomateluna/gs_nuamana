name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Cargar NVM y Node.js para que estén disponibles en este shell no interactivo
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd /var/www/nuamana
            # Descargar los últimos cambios desde GitHub
            git pull origin main
            
            # Asegurar la existencia de la tabla de control de migraciones
            echo "Inicializando tabla de control de migraciones..."
            docker exec -i supabase-db psql -U postgres -d postgres -c "CREATE TABLE IF NOT EXISTS public.applied_migrations (filename text PRIMARY KEY, applied_at timestamp default now());"

            # Desactivar temporalmente el trigger de notificaciones para evitar spam en migraciones
            echo "Desactivando trigger de notificaciones..."
            docker exec -i supabase-db psql -U postgres -d postgres -c "ALTER TABLE public.articulos DISABLE TRIGGER trigger_notificar_cambio_articulo;"
            
            # Aplicar sólo las migraciones no ejecutadas anteriormente en orden cronológico
            echo "Ejecutando migraciones de base de datos..."
            for f in supabase/migrations/*.sql; do
              filename=$(basename "$f")
              # Comprobar si la migración ya fue aplicada
              exists=$(docker exec -i supabase-db psql -U postgres -d postgres -t -c "SELECT 1 FROM public.applied_migrations WHERE filename = '$filename';" | tr -d '[:space:]')
              if [ "$exists" = "1" ]; then
                echo "Migración ya aplicada, omitiendo: $filename"
              else
                echo "Aplicando migración: $filename"
                docker exec -i supabase-db psql -U postgres -d postgres < "$f"
                docker exec -i supabase-db psql -U postgres -d postgres -c "INSERT INTO public.applied_migrations (filename) VALUES ('$filename');"
              fi
            done

            # Reactivar el trigger de notificaciones al finalizar
            echo "Reactivando trigger de notificaciones..."
            docker exec -i supabase-db psql -U postgres -d postgres -c "ALTER TABLE public.articulos ENABLE TRIGGER trigger_notificar_cambio_articulo;"

            # Entrar al frontend e instalar y compilar limpiando la caché de Next.js
            cd frontend
            npm install
            rm -rf .next
            npm run build
            
            # Reiniciar la aplicación de Next.js en PM2
            pm2 restart nuamana-pwa